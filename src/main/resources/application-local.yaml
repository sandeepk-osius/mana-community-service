spring:
  datasource:
    # Replace with your AWS RDS MySQL endpoint once deployed
    url: jdbc:postgresql://localhost:5432/manacommunity
    username: postgres
    password: mana@community@8008
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 'update' automatically creates/modifies tables to match your @Entity classes
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

# CORS Configuration for React Frontend
cors:
  allowed-origins: "http://localhost:3000"