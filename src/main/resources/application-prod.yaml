spring:
  application:
    name: mana-community-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: manacommunity
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false

server:
  port: 8080

app:
  cors:
    # Comma-separated list of allowed origins — set via EC2 env var or override here
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  security:
    mock-auth-enabled: false
