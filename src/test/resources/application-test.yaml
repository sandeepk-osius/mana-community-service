spring:
  datasource:
    url: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init-schema.sql
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: manacommunity
        format_sql: false
  h2:
    console:
      enabled: false

app:
  security:
    mock-auth-enabled: false   # Use @WithMockUserPrincipal in controller tests
  cors:
    allowed-origins: "http://localhost:3000"
  drop-table-on-startup:
    enabled: false
